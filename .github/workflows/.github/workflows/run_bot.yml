name: AutoBTC 24/7 Sandbox

on:
  schedule:
    - cron: '0 * * * *'  # รันทุกๆ ต้นชั่วโมง (เปลี่ยนได้กริบๆ)
  workflow_dispatch:      # เพิ่มปุ่มให้กดรันเองได้จากมือถือ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install ccxt asyncio

      - name: Run Bot
        run: python bot.py
