name: AutoBTC 24/7 Telegram Report

on:
  schedule:
    - cron: '0 * * * *'  # 🐯 รันทุกๆ ต้นชั่วโมงอัตโนมัติ (เช่น 14:00, 15:00)
  workflow_dispatch:      # 🐯 เพิ่มปุ่มให้กดรันเองได้จากมือถือเท่ๆ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ccxt asyncio
          # 🐯 ติดตั้ง requests เพื่อให้ส่งเข้า Telegram ได้กริบๆ!

      - name: Run Bot
        run: python bot.py
